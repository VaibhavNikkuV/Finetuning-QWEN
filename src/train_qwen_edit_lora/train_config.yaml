# =============================================================================
# Qwen-Image-Edit-2511 LoRA Fine-Tuning Configuration
# Task: Add teacher comments (red ink) to student answer sheets
# =============================================================================

# --- Model ---
pretrained_model_name_or_path: "Qwen/Qwen-Image-Edit-2511"

# --- Dataset (generated by generate_dataset.py) ---
dataset_dir: "./qwen_edit_dataset"          # Root dataset directory
img_dir: "./qwen_edit_dataset/targets"      # Teacher images (annotated output)
control_dir: "./qwen_edit_dataset/control_1" # Student images (clean input)
caption_dir: "./qwen_edit_dataset/captions"  # Instruction text files

# --- LoRA ---
lora_rank: 64                 # Higher rank = more capacity; affordable on 4 GPUs
lora_alpha: 128               # 2x rank (standard ratio)
lora_dropout: 0.05
target_modules:
  - "to_k"
  - "to_q"
  - "to_v"
  - "to_out.0"

# --- Training ---
train_batch_size: 1           # Per GPU → 1 × 4 GPUs × 2 accum = effective batch 8
gradient_accumulation_steps: 2 # Reduced from 4 (4 GPUs compensate)
num_train_epochs: 50
max_train_steps: null
learning_rate: 1.0e-4
lr_scheduler: "cosine"
lr_warmup_steps: 200          # ~5% of training, stabilizes early training
use_8bit_adam: true
mixed_precision: "bf16"
gradient_checkpointing: true
seed: 42

# --- Image ---
resolution: 768               # Safe for 24 GB/GPU; see notes below
center_crop: true

# --- Logging & Saving ---
output_dir: "./output/qwen_edit_lora"
logging_dir: "./output/logs"
save_every_n_steps: 250       # More frequent saves with faster training
log_every_n_steps: 10
num_validation_images: 2
validation_every_n_steps: 250

# --- Advanced ---
dataloader_num_workers: 4
max_grad_norm: 1.0
noise_offset: 0.0
snr_gamma: null